name: Stockbit Bot

on:
  push:
    branches:
      - "**"
  schedule:
    # GitHub Actions schedule uses UTC.
    # Auto run per sesi bursa reguler (WIB), Senin-Jumat:
    # 08:55 WIB = 01:55 UTC (pra-pembukaan)
    - cron: "55 1 * * 1-5"
    # 10:00 WIB = 03:00 UTC (tengah sesi 1)
    - cron: "0 3 * * 1-5"
    # 11:45 WIB = 04:45 UTC (menjelang akhir sesi 1)
    - cron: "45 4 * * 1-5"
    # 13:35 WIB = 06:35 UTC (awal sesi 2)
    - cron: "35 6 * * 1-5"
    # 14:30 WIB = 07:30 UTC (tengah sesi 2)
    - cron: "30 7 * * 1-5"
    # 15:45 WIB = 08:45 UTC (menjelang penutupan)
    - cron: "45 8 * * 1-5"
  workflow_dispatch:

jobs:
  run-stock-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GOAPI_KEY: ${{ secrets.GOAPI_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: python main.py
